    .modal-overlay {

      background: rgba(0,0,0,0.7); border-radius: 12px; display: flex;

<script>

// ── AUDIO ─────────────────────────────
function startAmbientAudio() {
  const audio = document.getElementById('ambient-audio');
  if (!audio) return;
  audio.volume = 0.28; audio.loop = true;
  const ensure = () => { if (audio.paused) audio.play().catch(()=>{}); };
  if (audio.dataset.started) { ensure(); return; }
  const tryPlay = () => {
    audio.play().then(() => { audio.dataset.started = '1'; ensure(); }).catch(() => setTimeout(tryPlay, 250));
  };
  if (audio.readyState >= 2) tryPlay();
  else { audio.addEventListener('canplaythrough', tryPlay, { once: true }); audio.load(); setTimeout(tryPlay, 600); }
}
window.addEventListener('load', () => {
  startAmbientAudio();
  setTimeout(() => {
    const loader = document.getElementById('loading-screen');
    loader.style.opacity = '0';
    setTimeout(() => loader.style.display = 'none', 800);
  }, 1200);
});

let joystickX = 0, joystickY = 0, isDragging = false, joyCenter = { x:0, y:0 };
const maxJoy = 30;
const joyCon = document.getElementById('joystick-container');
const joyKnob = document.getElementById('joystick-knob');
joyCon.addEventListener('pointerdown', e => {
  isDragging = true;
  const r = joyCon.getBoundingClientRect();
  joyCenter = { x: r.left + r.width/2, y: r.top + r.height/2 };
  updateJoystick(e.clientX, e.clientY);
  joyCon.setPointerCapture(e.pointerId);
});
joyCon.addEventListener('pointermove', e => { if (!isDragging) return; updateJoystick(e.clientX, e.clientY); });
function endJoy() { isDragging = false; joystickX = 0; joystickY = 0; joyKnob.style.transform = 'translate(0px,0px)'; }
joyCon.addEventListener('pointerup', endJoy);
joyCon.addEventListener('pointercancel', endJoy);
function updateJoystick(cx, cy) {
  const dx = cx - joyCenter.x, dy = cy - joyCenter.y;
  const dist = Math.hypot(dx, dy);
  const ang = Math.atan2(dy, dx);
  const cl = Math.min(dist, maxJoy);
  const mx = Math.cos(ang)*cl, my = Math.sin(ang)*cl;
  joyKnob.style.transform = `translate(${mx}px,${my}px)`;
  joystickX = mx/maxJoy; joystickY = my/maxJoy;
}
document.getElementById('hop-btn').addEventListener('pointerdown', e => {
  e.preventDefault();
  if (viewState === 'room' && player.z === 0 && !modalOpen) { player.vz = 4.8; player.squishX = 0.75; player.squishY = 1.3; }
});
document.getElementById('action-btn').addEventListener('pointerdown', e => {
  e.preventDefault();
  if (viewState === 'room' && !modalOpen) {
    const near = rooms[currentRoom].items.find(isNear);
    if (near) interactRoomItem(near);
  }
});

let currentRoom = 'bedroom';
let player = { x:310, y:240, z:0, vz:0, speed:2.8, facing:1, isMoving:false, hopTimer:0, squishX:1, squishY:1, color:'#06d6a0' };

const deskItems = {
  bobsDiary: { x:140, y:120, w:90, h:140 },
  myDiary: { x:260, y:110, w:100, h:150 },
  gallery: { x:400, y:130, w:110, h:130 },
  backBtn: { x:20, y:20, w:80, h:30 }
};
const MAX_CHARS = 500;
let diaryPages = [''];
let diaryPage = 0;
let diaryLoaded = false;

// Load diary from Firebase (fallback to localStorage)
function loadDiaryFromCloud() {
  db.ref('diary/pages').once('value').then(snapshot => {
    const data = snapshot.val();
    if (data && Array.isArray(data)) {
      diaryPages = data;
    } else {
      // try localStorage for migration
      const local = localStorage.getItem('bobs_haven_diary');
      diaryPages = local ? JSON.parse(local) : [''];
    }
    diaryPage = 0;
    diaryLoaded = true;
    updateDiaryUI();
  }).catch(() => {
    const local = localStorage.getItem('bobs_haven_diary');
    diaryPages = local ? JSON.parse(local) : [''];
    diaryLoaded = true;
    updateDiaryUI();
  });
}

// Save diary to Firebase (and local backup)
function saveDiaryToCloud() {
  if (diaryText.value.length > MAX_CHARS) diaryText.value = diaryText.value.substring(0, MAX_CHARS);
  diaryPages[diaryPage] = diaryText.value;
  // Save to Firebase
  db.ref('diary/pages').set(diaryPages).catch(() => {});
  // Also update local backup
  localStorage.setItem('bobs_haven_diary', JSON.stringify(diaryPages));
  updateDiaryUI();
}

function updateDiaryUI() {
  if (!diaryLoaded) return;
  diaryText.value = diaryPages[diaryPage] || '';
  pageDisplay.innerText = `Page ${diaryPage+1} / ${diaryPages.length}`;
  const nb = document.getElementById('next-btn');
  if (nb) nb.style.opacity = (diaryPage >= diaryPages.length-1 && (diaryPages[diaryPage]||'').length < MAX_CHARS) ? '0.5' : '1';
}

function saveDiary() {
  if (!diaryLoaded) return;
  if (diaryText.value.length > MAX_CHARS) diaryText.value = diaryText.value.substring(0, MAX_CHARS);
  diaryPages[diaryPage] = diaryText.value;
  // Auto-save to cloud
  db.ref('diary/pages').set(diaryPages).catch(() => {});
  localStorage.setItem('bobs_haven_diary', JSON.stringify(diaryPages));
}

function prevPage() {
  if (!diaryLoaded || diaryPage <= 0) return;
  saveDiary();
  diaryPage--;
  updateDiaryUI();
}

function nextPage() {
  if (!diaryLoaded) return;
  saveDiary();
  if ((diaryPages[diaryPage]||'').length < MAX_CHARS) {
    showToast(`Page must be full (${(diaryPages[diaryPage]||'').length}/${MAX_CHARS} chars) before moving next!`);
    return;
  }
  if (diaryPage === diaryPages.length-1) {
    diaryPages.push('');
  }
  diaryPage++;
  updateDiaryUI();
}

// Kick off loading

// ── PARTICLES / TOAST ─────────────────
for (let i=0; i<25; i++) stars.push({ x:270+Math.random()*100, y:45+Math.random()*55, size:Math.random()*2+0.5, alpha:Math.random(), speed:0.02+Math.random()*0.03 });
for (let i=0; i<18; i++) particles.push({ x:60+Math.random()*520, y:120+Math.random()*220, radius:Math.random()*1.5+0.5, alpha:Math.random()*0.5+0.2, vy:-0.15-Math.random()*0.2, vx:(Math.random()-0.5)*0.2, color:null, sparkle:false });
function addSparkles(x,y,n=12) {
  for (let i=0; i<n; i++) particles.push({ x,y, radius:Math.random()*2.5+1, alpha:1, vx:(Math.random()-0.5)*2.5, vy:(Math.random()-0.5)*2.5-1, color:['#ffd166','#ff70a6','#06d6a0','#fff'][Math.floor(Math.random()*4)], sparkle:true });
}
function showToast(t) { toast.innerText=t; toast.style.opacity='1'; clearTimeout(toastTimeout); toastTimeout=setTimeout(()=>toast.style.opacity='0',3500); }
function isNear(item) { return Math.hypot(player.x-(item.x+item.w/2), player.y-(item.y+item.h/2)) < 60; }

// ── VIEW SWITCHING ────────────────────
function changeView(v) {
  viewState = v; toast.style.opacity='0'; interactiveDiary.classList.remove('active');
  if (v==='room') { viewBadge.innerText='Room View'; footerText.innerText='Explore the room!'; }
  else if (v==='desk') { viewBadge.innerText='Desk View'; footerText.innerText='Click a book to open it.'; addSparkles(320,190,30); }
  else if (v==='my_diary') { viewBadge.innerText='Writing...'; footerText.innerText='Auto-saved.'; interactiveDiary.classList.add('active'); updateDiaryUI(); }
  else { viewBadge.innerText='Reading...'; footerText.innerText='Enjoy your memories!'; }
}
function openModal() { modalOpen=true; bedModal.classList.add('active'); }
function closeModal() { modalOpen=false; bedModal.classList.remove('active'); }
function sleepNow() { bedModal.classList.remove('active'); sleepScreen.style.opacity='1'; setTimeout(()=>window.location.href='index.html',2000); }
function interactRoomItem(item) {
  if (!item) return;
  if (item.id==='desk') { changeView('desk'); return; }
    if (item.isBed) { openModal(); return; }
  if (item.id==='chest') { item.active=true; showToast(item.msg); addSparkles(item.x+23,item.y+15,20); }
  if (item.special === 'shootingstar') {
  showToast(item.msg);
  createShootingStar();
  return;
  }
  else if (item.id==='plant') { item.active=10; showToast(item.msg); addSparkles(item.x+15,item.y+10,5); }
  else { showToast(item.msg); addSparkles(item.x+item.w/2,item.y+item.h/2,8); }
}

// ── INPUT ─────────────────────────────
window.addEventListener('pointerdown', startAmbientAudio, { once:true });
window.addEventListener('keydown', e => {
  startAmbientAudio();
  if (modalOpen || viewState==='my_diary') return;
  keys[e.key.toLowerCase()] = true;
  if (e.key==='Escape' && viewState!=='room') changeView(viewState==='desk'?'room':'desk');
  if (viewState==='room') {
    if ((e.key===' '||e.code==='Space') && player.z===0) { e.preventDefault(); player.vz=4.8; player.squishX=0.75; player.squishY=1.3; }
    if (e.key.toLowerCase()==='e') { const near = rooms[currentRoom].items.find(isNear); if (near) interactRoomItem(near); }
  }
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()]=false);
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (640 / rect.width);
  mouseY = (e.clientY - rect.top) * (380 / rect.height);
});
canvas.addEventListener('click', e => {
  if (modalOpen) return;
  if (viewState==='room') {
    const items = rooms[currentRoom].items;
    const clicked = items.find(i => mouseX>=i.x&&mouseX<=i.x+i.w&&mouseY>=i.y&&mouseY<=i.y+i.h);
    if (clicked && isNear(clicked)) interactRoomItem(clicked);
  } else if (viewState==='desk') {
    if (mouseX>deskItems.bobsDiary.x&&mouseX<deskItems.bobsDiary.x+deskItems.bobsDiary.w&&mouseY>deskItems.bobsDiary.y&&mouseY<deskItems.bobsDiary.y+deskItems.bobsDiary.h) changeView('bobs_diary');
    else if (mouseX>deskItems.myDiary.x&&mouseX<deskItems.myDiary.x+deskItems.myDiary.w&&mouseY>deskItems.myDiary.y&&mouseY<deskItems.myDiary.y+deskItems.myDiary.h) changeView('my_diary');
    else if (mouseX>deskItems.gallery.x&&mouseX<deskItems.gallery.x+deskItems.gallery.w&&mouseY>deskItems.gallery.y&&mouseY<deskItems.gallery.y+deskItems.gallery.h) changeView('gallery');
    else if (mouseX>deskItems.backBtn.x&&mouseX<deskItems.backBtn.x+deskItems.backBtn.w&&mouseY>deskItems.backBtn.y&&mouseY<deskItems.backBtn.y+deskItems.backBtn.h) changeView('room');
  } else if (viewState==='bobs_diary'||viewState==='gallery'||viewState==='my_diary') {
    if (mouseX>deskItems.backBtn.x&&mouseX<deskItems.backBtn.x+deskItems.backBtn.w&&mouseY>deskItems.backBtn.y&&mouseY<deskItems.backBtn.y+deskItems.backBtn.h) changeView('desk');
  }
});

// ── UPDATE ────────────────────────────
function update(dt) {
  if (viewState==='room' && !modalOpen) {
    let dx=0, dy=0;
    if (keys['a']||keys['arrowleft']) { dx-=1; player.facing=-1; }
    if (keys['d']||keys['arrowright']) { dx+=1; player.facing=1; }
    if (keys['w']||keys['arrowup']) dy-=1;
    if (keys['s']||keys['arrowdown']) dy+=1;
    if (joystickX||joystickY) { dx+=joystickX; dy+=joystickY; if(joystickX<-0.1)player.facing=-1; if(joystickX>0.1)player.facing=1; }
    let mag = Math.hypot(dx,dy);
    if (mag>1) { dx/=mag; dy/=mag; }
    player.isMoving = dx!==0||dy!==0;
    player.x += dx*player.speed;
    player.y += dy*player.speed;
    const pb = rooms[currentRoom].playerBounds;
    player.x = Math.max(pb.left, Math.min(pb.right, player.x));
    player.y = Math.max(pb.top, Math.min(pb.bottom, player.y));
    if (player.isMoving && player.z===0) { player.hopTimer+=0.22; player.z=Math.abs(Math.sin(player.hopTimer))*7; player.squishX=1+Math.sin(player.hopTimer)*0.12; player.squishY=1-Math.sin(player.hopTimer)*0.12; }
    else if (!player.isMoving && player.z===0) { player.hopTimer=0; player.squishX+=(1-player.squishX)*0.2; player.squishY+=(1-player.squishY)*0.2; }
    if (player.z>0||player.vz!==0) { player.z+=player.vz; player.vz-=0.35; if (player.z<=0) { player.z=0; player.vz=0; player.squishX=1.35; player.squishY=0.65; } }
    const plant = rooms[currentRoom].items.find(i=>i.id==='plant');
    if (plant && plant.active>0) plant.active -= dt;
    // Check doors
    for (let door of rooms[currentRoom].doors) {
      if (player.x>door.x && player.x<door.x+door.w && player.y>door.y && player.y<door.y+door.h) {
        currentRoom = door.target;
        player.x = door.spawnX; player.y = door.spawnY;
        break;
      }
    }
  }
     // Update all shooting stars
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const star = shootingStars[i];
    // Record trail point
    star.trail.push({ x: star.x, y: star.y, alpha: 1 });
    if (star.trail.length > 40) star.trail.shift();

    // Move star
    star.x += star.vx;
    star.y += star.vy;
    star.life--;

    // Add trailing particle
    particles.push({
      x: star.x + (Math.random() - 0.5) * 4,
      y: star.y + (Math.random() - 0.5) * 2,
      radius: 2 + Math.random() * 2,
      alpha: 0.8,
      vx: 0, vy: 0,
      color: '#ffffff',
      sparkle: false,
      life: 30,
      maxLife: 30
    });

    // Fade trail points
    for (let p of star.trail) p.alpha -= 0.025;
    star.trail = star.trail.filter(p => p.alpha > 0);

    // Remove star when done
    if (star.x < -50 || star.y > 400 || star.life <= 0) {
      shootingStars.splice(i, 1);
    }
  }
}
    particles.forEach((p, index) => {
    p.y += p.vy;
    p.x += p.vx;
    if (p.life !== undefined) {
      p.life--;
      p.alpha = p.life / p.maxLife;
    } else if (p.sparkle) {
      p.alpha -= 0.025;
    } else if (p.y < rooms[currentRoom].floorY - 10) {
      p.y = rooms[currentRoom].bounds.bottom;
    }
  });
    particles = particles.filter(p => (p.life !== undefined ? p.life > 0 : p.alpha > 0));


// ── DRAWING ───────────────────────────
function drawLivingRoom() {
  const room = rooms[currentRoom];
  ctx.fillStyle = '#101424'; ctx.fillRect(0,0,640,380);
  const wallGrad = ctx.createLinearGradient(0, room.bounds.top, 0, room.floorY);
  wallGrad.addColorStop(0,'#2b3552'); wallGrad.addColorStop(1,'#1e263d');
  ctx.fillStyle = wallGrad;
  ctx.fillRect(room.bounds.left, room.bounds.top, room.bounds.right-room.bounds.left, room.floorY-room.bounds.top);
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for (let x=room.bounds.left+15; x<room.bounds.right; x+=30) ctx.fillRect(x, room.bounds.top, 15, room.floorY-room.bounds.top);
  ctx.fillStyle = '#4a3728'; ctx.fillRect(room.bounds.left, room.floorY-8, room.bounds.right-room.bounds.left, 8);
  const floorGrad = ctx.createLinearGradient(0,room.floorY,0,room.bounds.bottom);
  floorGrad.addColorStop(0,'#604835'); floorGrad.addColorStop(1,'#3d2d20');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(room.bounds.left, room.floorY, room.bounds.right-room.bounds.left, room.bounds.bottom-room.floorY);
  ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth=2;
  for (let y=room.floorY+25; y<room.bounds.bottom; y+=25) {
    ctx.beginPath(); ctx.moveTo(room.bounds.left,y); ctx.lineTo(room.bounds.right,y); ctx.stroke();
  }
  // Draw doors
  for (let door of rooms[currentRoom].doors) {
    drawDoor(door);
  }
}

function drawPatio() {
  // Night sky
  ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, 0, 640, 300);
  // Stars
  for (let i = 0; i < 60; i++) {
    const sx = (i * 37 + 13) % 640;
    const sy = (i * 23 + 7) % 280;
    const twinkle = Math.sin(Date.now() * 0.002 + i) * 0.5 + 0.5;
    ctx.fillStyle = `rgba(255,255,255,${0.4 + twinkle * 0.6})`;
    ctx.fillRect(sx, sy, 2, 2);
  }
  // Moon
  ctx.fillStyle = '#fff3bf'; ctx.beginPath(); ctx.arc(550, 60, 30, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0a0a1a'; ctx.beginPath(); ctx.arc(560, 55, 25, 0, Math.PI*2); ctx.fill();
  // House exterior (bottom)
  ctx.fillStyle = '#4a3728'; ctx.fillRect(40, 300, 560, 80);
  ctx.fillStyle = '#2b1e16'; ctx.fillRect(40, 300, 560, 8);
  // Roof
  ctx.fillStyle = '#2b1e16'; ctx.beginPath(); ctx.moveTo(30, 300); ctx.lineTo(610, 300); ctx.lineTo(580, 270); ctx.lineTo(60, 270); ctx.fill();
  // Door (south)
  ctx.fillStyle = '#3a2f28'; ctx.fillRect(280, 340, 80, 40);
  ctx.fillStyle = '#2b1e16'; ctx.fillRect(283, 343, 74, 34);
  ctx.fillStyle = '#f9c74f'; ctx.fillRect(348, 360, 4, 6);
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(284, 340, 72, 4);
  // Windows
  ctx.fillStyle = '#18122b'; ctx.fillRect(100, 320, 30, 30);
  ctx.fillStyle = '#ffd166'; ctx.fillRect(110, 330, 3, 3); ctx.fillRect(120, 325, 3, 3);
  ctx.fillStyle = '#18122b'; ctx.fillRect(510, 320, 30, 30);
  ctx.fillStyle = '#ffd166'; ctx.fillRect(520, 328, 3, 3);
  // Grass
  ctx.fillStyle = '#2d5a27'; ctx.fillRect(0, 300, 640, 80);
  ctx.fillStyle = '#3d7a33';
  for (let x = 0; x < 640; x += 8) {
    for (let y = 305; y < 380; y += 12) {
      ctx.fillRect(x + Math.sin(y * 0.5) * 2, y, 3, 3);
    }
  }
  // Path stones
  ctx.fillStyle = '#8b8b8b';
  for (let y = 340; y < 380; y += 15) {
    ctx.beginPath(); ctx.ellipse(320, y, 15, 5, 0, 0, Math.PI*2); ctx.fill();
  }
  // Fireflies
  for (let i = 0; i < 20; i++) {
    const t = Date.now() * 0.001 + i;
    const fx = 80 + (i * 37) % 480;
    const fy = 220 + Math.sin(t * 1.5) * 30 + (i * 19) % 60;
    ctx.fillStyle = `rgba(255,235,120,${0.4 + Math.sin(t * 2) * 0.3})`;
    ctx.beginPath(); ctx.arc(fx, fy, 2, 0, Math.PI*2); ctx.fill();
  }

}
function drawRoom() {
  const room = rooms[currentRoom];
  ctx.fillStyle = '#101424'; ctx.fillRect(0,0,640,380);
  const wallGrad = ctx.createLinearGradient(0,room.bounds.top,0,room.floorY);
  wallGrad.addColorStop(0,'#2b3552'); wallGrad.addColorStop(1,'#1e263d');
  ctx.fillStyle = wallGrad;
  ctx.fillRect(room.bounds.left, room.bounds.top, room.bounds.right-room.bounds.left, room.floorY-room.bounds.top);
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for (let x=room.bounds.left+15; x<room.bounds.right; x+=30) ctx.fillRect(x, room.bounds.top, 15, room.floorY-room.bounds.top);
  ctx.fillStyle = '#4a3728'; ctx.fillRect(room.bounds.left, room.floorY-8, room.bounds.right-room.bounds.left, 8);
  const floorGrad = ctx.createLinearGradient(0,room.floorY,0,room.bounds.bottom);
  floorGrad.addColorStop(0,'#604835'); floorGrad.addColorStop(1,'#3d2d20');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(room.bounds.left, room.floorY, room.bounds.right-room.bounds.left, room.bounds.bottom-room.floorY);
  ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth=2;
  for (let y=room.floorY+25; y<room.bounds.bottom; y+=25) {
    ctx.beginPath(); ctx.moveTo(room.bounds.left,y); ctx.lineTo(room.bounds.right,y); ctx.stroke();
  }
  // Rug
  ctx.fillStyle = '#a882c3'; ctx.beginPath(); ctx.ellipse(320,240,110,55,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#be9ad8'; ctx.beginPath(); ctx.ellipse(320,240,95,45,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffe39f'; ctx.font='16px monospace'; ctx.fillText('★',315,245); ctx.fillText('✦',270,235); ctx.fillText('✦',360,245);
    // Window
  const win = rooms[currentRoom].items.find(i=>i.id==='window');
  if (win) {
    ctx.fillStyle = '#18122b'; ctx.fillRect(win.x,win.y,win.w,win.h);
    stars.forEach(s => { ctx.fillStyle=`rgba(255,255,255,${s.alpha})`; ctx.fillRect(s.x,s.y,s.size,s.size); });
    ctx.fillStyle = '#fff3bf'; ctx.beginPath(); ctx.arc(win.x+95,win.y+25,12,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#5a4332'; ctx.lineWidth=4; ctx.strokeRect(win.x,win.y,win.w,win.h);
    ctx.beginPath(); ctx.moveTo(win.x+win.w/2,win.y); ctx.lineTo(win.x+win.w/2,win.y+win.h); ctx.stroke();
    ctx.fillStyle = '#e56b6f'; ctx.fillRect(win.x-5,win.y,25,win.h+10); ctx.fillRect(win.x+win.w-20,win.y,25,win.h+10);
    ctx.fillStyle = '#5c3a21'; ctx.fillRect(win.x-10,win.y-5,win.w+20,8);
  }
  // Draw doors (outside window block!)
  for (let door of rooms[currentRoom].doors) {
    drawDoor(door);
  }
}

function drawPlayer() {
  const px = player.x, py = player.y-player.z;
  ctx.save(); ctx.translate(px,py);
  ctx.fillStyle = `rgba(0,0,0,${Math.max(0.1,0.35-player.z*0.015)})`;
  ctx.beginPath(); ctx.ellipse(0,player.z+10,14*(1+player.z*0.02),6,0,0,Math.PI*2); ctx.fill();
  ctx.scale(player.facing*player.squishX, player.squishY);
  ctx.fillStyle = player.color; ctx.beginPath(); ctx.ellipse(0,0,15,12,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.beginPath(); ctx.ellipse(-3,-5,7,4,-0.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0a2e23'; ctx.beginPath(); ctx.arc(3,-2,2.8,0,Math.PI*2); ctx.arc(9,-2,2.8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(2,-3,1,0,Math.PI*2); ctx.arc(8,-3,1,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,112,166,0.6)'; ctx.beginPath(); ctx.arc(1,2,2.5,0,Math.PI*2); ctx.arc(11,2,2.5,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#0a2e23'; ctx.lineWidth=1.2; ctx.beginPath(); ctx.arc(6,1,2,0.1,Math.PI-0.1); ctx.stroke();
  ctx.restore();
}
function drawDoor(door) {
  const { x, y, w, h, dir, drawX, drawW } = door;
  const visX = drawX !== undefined ? drawX : x;
  const visW = drawW !== undefined ? drawW : w;

  if (dir === 'north') {
    const doorWidth = visW || 60;
    const doorHeight = 70;
    const doorX = visX;
    const doorY = y - doorHeight;
    ctx.fillStyle = '#3a2f28'; ctx.fillRect(doorX, doorY, doorWidth, doorHeight);
    ctx.fillStyle = '#2b1e16'; ctx.fillRect(doorX+3, doorY+3, doorWidth-6, doorHeight-6);
    ctx.fillStyle = '#f9c74f'; ctx.beginPath(); ctx.arc(doorX+doorWidth-8, doorY+doorHeight/2, 4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(doorX+4, y, doorWidth-8, 8);
    return;
  }

  // East / West doors – draw only the slim visual part
  ctx.fillStyle = '#3a2f28'; ctx.fillRect(visX, y, visW, h);
  ctx.fillStyle = '#2b1e16'; ctx.fillRect(visX+2, y+2, visW-4, h-4);
  ctx.fillStyle = '#f9c74f';
  if (dir === 'east') ctx.fillRect(visX+visW-4, y+h/2-3, 3, 6);
  else if (dir === 'west') ctx.fillRect(visX+1, y+h/2-3, 3, 6);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  if (dir === 'east') ctx.fillRect(visX+visW, y+5, 10, h-10);
  else if (dir === 'west') ctx.fillRect(visX-10, y+5, 10, h-10);
}

    const renderables = [...items.filter(i=>i.id!=='window'), { isPlayer:true, y:player.y }];
    renderables.sort((a,b) => a.y - b.y);
    renderables.forEach(obj => obj.isPlayer ? drawPlayer() : drawFurniture(obj));
  } else if (viewState==='desk') drawDeskTopView();
  else if (viewState==='bobs_diary') drawbobsDiaryView();
  else if (viewState==='gallery') drawGalleryView();
  else if (viewState==='my_diary') drawMyDiaryView();
  // particles & UI
  const nearItem = rooms[currentRoom].items.find(isNear);
  if (nearItem && viewState==='room' && !modalOpen) {
    ctx.fillStyle = 'rgba(15,23,42,0.85)'; ctx.strokeStyle='#06d6a0'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(200,15,240,32,8); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
    ctx.fillText(`Press [E] or Click: ${nearItem.name}`,320,36);
  }
     // Draw all shooting stars
  for (const star of shootingStars) {
    // Trail
    if (star.trail.length > 1) {
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(star.trail[0].x, star.trail[0].y);
      for (let i = 1; i < star.trail.length; i++) {
        ctx.lineTo(star.trail[i].x, star.trail[i].y);
      }
      ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 9;
      ctx.stroke();
      ctx.lineWidth = 1;
    }
    // Head
    const alpha = star.life / star.maxLife;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath(); ctx.arc(star.x, star.y, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = `rgba(255,255,255,${alpha * 0.3})`;
    ctx.beginPath(); ctx.arc(star.x, star.y, 8, 0, Math.PI * 2); ctx.fill();
  }
}
function createShootingStar() {
  shootingStars.push({
    x: 620 + Math.random() * 40,
    y: 10 + Math.random() * 40,
    vx: -0.7 - Math.random() * 0.5,
    vy: 0.15 + Math.random() * 0.2,
    life: 500,
    maxLife: 500,
    trail: []   // each star has its own trail
  });
}
let lastTime = 0;
function loop(time) {
  const dt = Math.min(1.2, (time - lastTime) / 16.67 || 1);
  lastTime = time;
  startAmbientAudio();
  update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);


</script>
